name: Android build

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
      - uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '8.10.2'
      - run: gradle -p android assembleDebug
      - run: |
          mkdir -p builds/android
          cp android/app/build/outputs/apk/debug/app-debug.apk builds/android/MEpromo-debug.apk
          git config user.name github-actions
          git config user.email github-actions@github.com
          git add builds/android/MEpromo-debug.apk
          git diff --cached --quiet || git commit -m "Build Android app"
          git pull --rebase origin main
          git push
