name: Cron Media Expert LEGO prices

on:
  schedule:
    # TEST: GitHub Actions NIE obsługuje pola timezone przy schedule.
    # Odpalamy co 5 minut w UTC, a run_listing_only_safe.py sam pomija
    # zaplanowane uruchomienia między 00:00 a 05:59 czasu polskiego.
    - cron: "*/5 * * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: mepromo-price-refresh
  cancel-in-progress: false

jobs:
  update-prices:
    runs-on: ubuntu-latest
    timeout-minutes: 12

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install requirements
        run: pip install -r requirements.txt

      - name: Run listing scraper safely
        env:
          APIFY_TOKEN: ${{ secrets.APIFY_TOKEN }}
          APIFY_PROXY_GROUPS: ${{ vars.APIFY_PROXY_GROUPS }}
          APIFY_PROXY_COUNTRY: ${{ vars.APIFY_PROXY_COUNTRY }}
        run: python run_listing_only_safe.py

      - name: Commit updated data
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"

          git add data/latest_prices.json data/price_history.csv data/last_run_status.json

          if git diff --cached --quiet; then
            echo "No data changes to commit."
            exit 0
          fi

          git commit -m "Update LEGO prices"
          git pull --rebase origin main
          git push
